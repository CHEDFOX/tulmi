name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck + base-url drift guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install (frozen)
        run: npm ci --no-audit --no-fund

      - name: Drift guard (BACKEND_BASE_URL across JS / Kotlin / Swift)
        run: npm run check:base-url

      - name: Typecheck
        run: npm run typecheck
