# Flow — one-command deploy. SAFE FOR A SHARED VPS:
# by default it binds to localhost only on an uncommon port and does NOT touch
# ports 80/443, so it cannot collide with your other apps.
#
#   Start (localhost only):   docker compose up -d --build
#   Quick public test:        FLOW_BIND=0.0.0.0 docker compose up -d --build
#                             (reach it at http://YOUR_VPS_IP:8770)
#   Own HTTPS proxy (only if 80/443 are FREE):
#                             docker compose --profile https up -d --build
#
# Tunables (set in your shell or in backend/.env):
#   FLOW_BIND  - host interface to bind (default 127.0.0.1 = localhost only)
#   FLOW_PORT  - host port (default 8770; change if 8770 is taken)
#
# Keys come from backend/.env (never commit it). See .env.example.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      HOST: 0.0.0.0 # inside the container; harmless
      PORT: 8080 # container-internal port
    # Host-side binding. Default 127.0.0.1:8770 => private to this VPS, no
    # public exposure, no chance of clashing with 80/443 or other backends.
    ports:
      - "${FLOW_BIND:-127.0.0.1}:${FLOW_PORT:-8770}:8080"
    restart: unless-stopped

  # OPTIONAL reverse proxy with automatic HTTPS. It claims ports 80 and 443, so
  # ONLY use this if nothing else on the VPS is using them. If you already run
  # nginx/Apache/Caddy for your other apps, DON'T enable this — instead add a
  # subdomain to that existing proxy pointing at 127.0.0.1:8770 (see DEPLOY.md).
  # It never starts on a plain `docker compose up` (profile-gated).
  caddy:
    image: caddy:2
    profiles: ["https"]
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
